# ============================================================================
# 2D Eulerian cylinder LG case configuration
# 本 case 只维护这一份 config.ini。
# enable_staged_refinement=true 时，主程序会用本文件作为唯一用户配置：
#   1) 粗分辨率计算到 coarse_stage_fraction * end_time；
#   2) 自动生成局部加密几何、执行 remap；
#   3) 局部加密后继续计算到 end_time。
# 内部阶段差异由程序内存覆盖，不会再生成 coarse/refined config.ini。
# ============================================================================

[geometry]
# 计算域几何
dl = 1.4
dh = 0.8
global_resolution = 0.005
sponge_width_factor = 5.0
cylinder_center_x = 0.3
cylinder_center_y = 0.4
cylinder_radius = 0.025

[fluid]
rho0_f = 1
u_f = 0.06
sound_speed_factor = 10.0
re = 100

[simulation]
end_time = 200.0
output_interval = 1.0
screen_output_interval = 1000
acoustic_cfl = 0.2
riemann_limiter_parameter = 3.0
# 是否运行粒子松弛；正式两段运行保持 false，内部几何准备阶段会自动覆盖为 true。
run_particle_relaxation = false
# 是否从 reload 粒子文件启动；正式两段入口保持 false，内部加密续算阶段会自动覆盖为 true。
reload_particles = false
pressure_contact_only_normal = false

[Restart]
enable_restart = true
# 手动续算起点：0 从头开始；-1 自动读取 restart/ 最新 checkpoint；>0 指定 checkpoint 步数。
restart_step = 0
restart_output_factor = 10
restart_keep_last_n = 3

[LocalRefinement]
# 是否启用自动两段局部加密流程。
# true：粗算到 coarse_stage_fraction * end_time -> remap -> 加密续算到 end_time。
# false：按本 config 的普通单段设置运行，不自动 remap。
enable_staged_refinement = true
# 粗分辨率阶段占总物理时间的比例。例如 0.4 表示前 40% 粗算，后 60% 局部加密续算。
coarse_stage_fraction = 0.4
# 局部加密区目标粒子间距因子。例如0.667 表示加密区 dp = 0.667 * global_resolution。
spacing_factor = 0.5
# 局部加密矩形区域
region_x_min = 0.25
region_x_max = 0.8
region_y_min = 0.3
region_y_max = 0.5


# 日志调试区
# 单段调试局部加密时才手动设 true；两段正式入口保持 false。
enable_local_refinement = false
# 单段调试 remap 续算时才手动设 true；两段正式入口保持 false。
load_remapped_state = false
# 单段调试 remap 续算时的起始物理时间；两段流程会自动写入粗算 checkpoint 时间。
remap_physical_time = 0.0
# 是否打开局部加密逐 acoustic step 诊断。
# false 为正式运行默认；true 只用于排查发散，会显著拖慢第二段。
runtime_diagnostics = false
# 传统加密层级下限；spacing_factor 会自动推导所需层级并取较大值。
refinement_level = 1
